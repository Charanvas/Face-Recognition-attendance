{% extends "layout.html" %}
{% block content %}
    <div class="card">
        <div class="card-header">
            <h2>Student List</h2>
        </div>
        <div class="card-body">
            {% if students %}
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Roll Number</th>
                            <th>Image</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                            <tr>
                                <td>{{ student.id }}</td>
                                <td>{{ student.name }}</td>
                                <td>{{ student.roll_number }}</td>
                                <td>
                                    <img src="{{ url_for('static', filename='uploads/' + student.image_file) }}" 
                                         alt="{{ student.name }}" width="100">
                                </td>
                                <td>
                                    <form action="{{ url_for('delete_student', student_id=student.id) }}" method="POST" 
                                          onsubmit="return confirm('Are you sure you want to delete this student?');">
                                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            {% else %}
                <p>No students found. <a href="{{ url_for('add_student') }}">Add a student</a>.</p>
            {% endif %}
        </div>
    </div>
{% endblock %}
